<body class="bg-dark">
   



     <main class="container">
        <section class="row justify-content-center">
            <form action="" class="col-md-8 my-3 rounded-2 bg-danger-subtle">
                <legend class="text-center display-5 my-2">from title</legend>
                <div class="row justify-content-around my-3">
                    <label class="col-md-3 col-10" for="UName">user name</label>

                    <div class="col-md-8 col-10">
                        <input class="form-control" id="UName" type="text" />
                    </div>
                </div>

                <div class="row justify-content-around my-3">
                    <label class="col-md-3 col-10" for="password">password</label>
              
                   <div class="col-md-8 col-10">
                      <input class="form-control" id="password" type="password" />
                   </div>
                </div>

                <div class="row justify-content-around my-3">
                    <label class="col-md-3 col-10" for="">website</label>
              
                   <div class="col-md-8 col-10">
                      <input class="form-control" id="" type="text" />
                   </div>
                </div>

                <div class="row justify-content-around my-3 align-items-center">
                    <label class="col-md-3 col-10" for="">phone number</label>
              
                   <div class="col-md-8 col-10">
                    <div class="input-group">
                        <span class="input-group-text">+20</span>
                         <input class="form-control" id="password" type="number" />
                    </div>
                   </div>
                </div>

                <!-- <div class="form-floating">
                    <input class="form-control" type="email" placeholder="...........">
                    <label for="">email</label>
                </div>  -->

                <div class="row justify-content-around my-3">
                    <label class="col-md-3 col-10" for="">profile</label>
                    <div class="col-md-8 col-10" >
                        <input class="form-control" id="" type="url">
                    </div>
                </div> 

                <div class="row justify-content-around my-3">
                   <label class="col-md-3 col-10" for="">gender</label>
                   <div class="col-md-8 col-10" >
                      <input class="form-check-input" id="password" type="radio" name="gender">
                      <label class="form-check-label" for="">male</label>
                      <input class="form-check-input" id="password" type="radio" name="gender">
                      <label class="form-check-label" for="">female</label>
                   </div>
                </div> 

                <div class="row justify-content-around my-3">
                     <label class="col-md-3 col-10" for="">gender</label>

                     <div class="col-md-8 col-10">
                        <div class="form-check-inline form-switch">
                            <input class="form-check-input" id="gend" type="radio" name="gender">
                            <label class="form-check-label" for="" >male</label>
                        </div>
                        <div class="form-check-inline form-switch">
                            <input class="form-check-input" id="gend" type="radio" name="gender">
                            <label class="" for="" >female</label>
                        </div>
                     </div>
               

                   <div class="row justify-content-around my-3 align-items-center">
                       <label class="col-md-3 col-10 px-0 mb-5" for="">message</label>
                       <div class="col-md-8 col-10">
                          <textarea name="" placeholder="text........" class="form-control" id=""></textarea>
                       </div>
                    </div>
                </div> 



        
                
            </form>
